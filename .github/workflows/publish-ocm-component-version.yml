name: Publish OCM Component Version

on:
  workflow_call:
    inputs:
      component_artifact_name:
        description: "Artifact containing the self-contained CTF to promote."
        required: true
        type: string
      component_reference:
        description: "Component reference (name:version) to transfer from the CTF, e.g. ocm.software/ocm:1.0.0."
        required: true
        type: string
      ocm_repository:
        description: "Target OCM repository root."
        required: false
        default: "ghcr.io/open-component-model"
        type: string
      cli_image:
        description: "OCI image containing the OCM CLI used to publish."
        required: false
        default: "ghcr.io/open-component-model/cli:0.0.0-main"
        type: string

permissions:
  contents: read

jobs:
  publish:
    name: Publish Component Version
    runs-on: ubuntu-24.04-arm
    permissions:
      actions: read # Required for downloading the CTF artifact
      packages: write # Required for pushing to GHCR
    steps:
      - name: Download component CTF
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: ${{ inputs.component_artifact_name }}
          path: ${{ github.workspace }}/ctf

      - name: Verify CTF
        env:
          CTF_DIR: ${{ github.workspace }}/ctf
        shell: bash
        run: |
          set -euo pipefail

          test -f "${CTF_DIR}/artifact-index.json" || (echo "❌ CTF index missing: ${CTF_DIR}/artifact-index.json" && exit 1)
          echo "✅ CTF present. Contents:"
          find "${CTF_DIR}" -maxdepth 2 -type f | sort

      - name: Login to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate OCM config
        shell: bash
        run: |
          set -euo pipefail

          cat > "${HOME}/.ocmconfig" <<'EOF'
          type: generic.config.ocm.software/v1
          configurations:
            - type: credentials.config.ocm.software
              repositories:
                - repository:
                    type: DockerConfig/v1
                    dockerConfigFile: /.docker/config.json
                    propagateConsumerIdentity: true
          EOF

      # WORKDIR is mounted into the Docker container so the OCM CLI can read the
      # CTF at the same absolute path used on the runner. `transfer --recursive`
      # walks the umbrella's componentReferences so the cli and controller
      # sub-components are promoted too; `--copy-resources --upload-as ociArtifact`
      # pushes their images and chart as first-class OCI artifacts.
      - name: Transfer component graph to GHCR
        env:
          OCM_REPOSITORY: ${{ inputs.ocm_repository }}
          CLI_IMAGE: ${{ inputs.cli_image }}
          COMPONENT_REFERENCE: ${{ inputs.component_reference }}
          WORKDIR: ${{ github.workspace }}
          CTF_DIR: ${{ github.workspace }}/ctf
        shell: bash
        run: |
          set -euo pipefail

          docker run --rm \
            -v "${HOME}/.docker/config.json:/.docker/config.json:ro" \
            -v "${HOME}/.ocmconfig:/.ocmconfig:ro" \
            -v /etc/ssl/certs/:/etc/ssl/certs/:ro \
            -v "${WORKDIR}:${WORKDIR}" \
            -w "${WORKDIR}" \
            "${CLI_IMAGE}" \
              transfer component-version \
              --config "/.ocmconfig" \
              --recursive \
              --copy-resources \
              --upload-as ociArtifact \
              "ctf::${CTF_DIR}//${COMPONENT_REFERENCE}" \
              "${OCM_REPOSITORY}"
