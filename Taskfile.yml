vars:
  GO_MODULES:
    sh: find '{{ .ROOT_DIR }}' -path '{{ .ROOT_DIR }}/website' -prune -o -name go.mod -print -exec dirname {} \; | grep -v go.mod | sed 's|{{ .ROOT_DIR }}/||'

tasks:
  default:
    deps: ["cli:build", "kubernetes/controller:build"]

  go_modules:
    desc: "List all Go Modules available in this project"
    cmd: echo "{{ .GO_MODULES }}"
    silent: true

  test:
    desc: "Run all tests in the project"
    vars:
      TASKS:
        sh: "task -aj | jq -r '.tasks[] | select(.name | endswith(\":test\")) | .name | rtrimstr(\":test\")'"
    cmds:
      - for: { var: TASKS }
        task: '{{.ITEM}}:test'
  test/integration:
    desc: "Run all integration tests in the project, possibly requiring external systems"
    vars:
      TASKS:
        sh: "task -aj | jq -r '.tasks[] | select(.name | endswith(\":test/integration\")) | .name | rtrimstr(\":test/integration\")'"
    cmds:
      - for: { var: TASKS }
        task: '{{.ITEM}}:test/integration'

  init/go.work:
    desc: "Initialize the workspace environment"
    status:
      - find go.work
    cmds:
      - go work init
      - for: { var: GO_MODULES }
        cmd: 'go work use {{.ITEM}}'

  tidy:
    desc: "Run go mod tidy on all Go modules in the project"
    cmds:
      - for: { var: GO_MODULES }
        cmd: 'cd {{.ITEM}} && go mod tidy'

  generate:
    desc: "Run all Code Generators in the project"
    cmds:
      - task: 'bindings/go/generator:ocmtypegen/generate'
      - task: 'bindings/go/generator:jsonschemagen/generate'
      - task: 'tools:deepcopy-gen/generate-deepcopy'
      - task: 'kubernetes/controller:manifests'
      - task: 'kubernetes/controller:generate'
      - task: 'cli:generate/docs'
        vars:
          CLI_DOCUMENTATION_MODE: "hugo"
          CLI_DOCUMENTATION_DIRECTORY: '{{ .ROOT_DIR }}/cli/docs/reference'
      - task: 'tidy'

  component/ctf:
    desc: "Build the aggregate ocm.software/ocm component version (references the cli and controller components) into a CTF"
    summary: |
      Builds the cli and controller component versions and an aggregate
      ocm.software/ocm component that references them via componentReferences,
      all into one self-contained CTF (the references resolve within the archive).

      Mirrors the per-component tasks: cli:generate/ctf and
      kubernetes/controller:generate/ctf. Override VERSION (default 0.0.0-dev)
      and REPOSITORY to use a remote OCM repository instead of the local CTF:
        task component/ctf VERSION=0.1.0 REPOSITORY=ghcr.io/<your-org>
    vars:
      VERSION: '{{ .VERSION | default "0.0.0-dev" }}'
      REPOSITORY: '{{ .REPOSITORY | default (printf "%s/tmp/ocm-ctf" .ROOT_DIR) }}'
      OCM: '{{ .ROOT_DIR }}/cli/tmp/bin/ocm'
      OCM_CONSTRUCTOR: '{{ .ROOT_DIR }}/tmp/ocm-component-constructor.yaml'
    cmds:
      # Build the cli and controller component bundles (+ the host CLI used to add).
      - task: 'cli:generate/component-constructor'
        vars:
          VERSION: '{{ .VERSION }}'
      - task: 'cli:build'
      - task: 'kubernetes/controller:generate/component-constructor'
        vars:
          VERSION: '{{ .VERSION }}'
      # Generate the aggregate constructor that references the two sub-components.
      - |
        mkdir -p '{{ .ROOT_DIR }}/tmp'
        cat > '{{ .OCM_CONSTRUCTOR }}' <<EOF
        name: ocm.software/ocm
        version: {{ .VERSION }}
        provider:
          name: ocm.software
        componentReferences:
          - name: cli
            componentName: ocm.software/cli
            version: {{ .VERSION }}
          - name: controller
            componentName: ocm.software/ocm-k8s-toolkit
            version: {{ .VERSION }}
        EOF
        cat '{{ .OCM_CONSTRUCTOR }}'
      # Add all three components into one repository. The cli and controller
      # components are added first (each from its own bundle dir so resource
      # input paths resolve), then the aggregate that references them.
      - rm -rf '{{ .REPOSITORY }}'
      - cd '{{ .ROOT_DIR }}/cli/tmp' && '{{ .OCM }}' add component-versions --constructor component-constructor.yaml --repository '{{ .REPOSITORY }}'
      - cd '{{ .ROOT_DIR }}/kubernetes/controller/tmp' && '{{ .OCM }}' add component-versions --constructor component-constructor.yaml --repository '{{ .REPOSITORY }}'
      - "'{{ .OCM }}' add component-versions --constructor '{{ .OCM_CONSTRUCTOR }}' --repository '{{ .REPOSITORY }}'"
      - "'{{ .OCM }}' get cv '{{ .REPOSITORY }}//ocm.software/ocm:{{ .VERSION }}'"
